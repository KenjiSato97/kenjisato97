name: Generate Fluminense Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: kenjisato97
          outputs: |
            dist/github-snake.svg?color_snake=7a1f2b&color_dots=#1e5128,#2d6a4f,#40916c,#52b788,#74c69d
            dist/github-snake-dark.svg?color_snake=7a1f2b&color_dots=#1e5128,#2d6a4f,#40916c,#52b788,#74c69d

      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
